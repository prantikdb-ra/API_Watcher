<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>API Watcher</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#FFFFFF;--bg2:#F8F9FA;--bg3:#F1F3F5;--border:#E2E6EA;
      --accent:#0066FF;--accent2:#7B61FF;--red:#E63946;--green:#1A9E5C;
      --orange:#E07B00;--text:#1A1D23;--muted:#6B7280;--muted2:#9CA3AF;
      --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
      --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
    }
    body{width:540px;min-height:560px;max-height:640px;background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column;overflow:hidden}

    /* Header */
    .header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
    .logo{width:26px;height:26px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px}
    .h-left{display:flex;align-items:center;gap:9px}
    .title{font-size:13px;font-weight:700;color:var(--text)}
    .page-host{font-size:9px;color:var(--muted);font-family:var(--mono)}
    .h-right{display:flex;align-items:center;gap:7px}
    .toggle-wrap{display:flex;align-items:center;gap:5px}
    .toggle-label{font-size:9px;font-family:var(--mono);color:var(--muted)}
    .toggle{position:relative;width:32px;height:17px}
    .toggle input{opacity:0;width:0;height:0}
    .toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:17px;cursor:pointer;transition:.2s}
    .toggle-slider:before{content:'';position:absolute;width:11px;height:11px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
    .toggle input:checked+.toggle-slider{background:var(--accent)}
    .toggle input:checked+.toggle-slider:before{transform:translateX(15px)}
    .icon-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
    .icon-btn:hover{background:var(--bg3);color:var(--text)}

    /* Tabs */
    .tab-bar{display:flex;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 4px}
    .tab-btn{flex:1;padding:9px 4px;font-family:var(--sans);font-size:10px;font-weight:500;color:var(--muted);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
    .tab-btn:hover{color:var(--text)}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
    .tab-panel{display:none;flex-direction:column;flex:1;overflow:hidden}
    .tab-panel.active{display:flex}

    /* Toolbar */
    .toolbar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
    .toolbar-search{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:10px;padding:5px 9px;outline:none;flex:1;transition:border-color .15s;box-shadow:var(--shadow)}
    .toolbar-search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,102,255,.1)}
    .toolbar-search::placeholder{color:var(--muted2)}
    .count-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);white-space:nowrap}
    .count-lbl b{color:var(--accent);font-weight:600}
    .btn-xs{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:var(--sans);font-size:9px;font-weight:500;padding:4px 9px;cursor:pointer;transition:all .15s;white-space:nowrap;box-shadow:var(--shadow)}
    .btn-xs:hover{color:var(--text);border-color:var(--muted)}
    .btn-xs.danger{border-color:#FECACA;color:var(--red);background:#FFF5F5}
    .btn-xs.danger:hover{background:var(--red);color:#fff;border-color:var(--red)}
    .btn-xs.primary{border-color:#BFDBFE;color:var(--accent);background:#EFF6FF}
    .btn-xs.primary:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

    /* Filter bar */
    .filter-bar{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
    .filter-select{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--mono);font-size:9px;padding:4px 7px;outline:none;cursor:pointer;box-shadow:var(--shadow)}
    .filter-select:focus{border-color:var(--accent)}
    .filter-label{font-family:var(--sans);font-size:9px;color:var(--muted);font-weight:500}

    /* List */
    .item-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:4px;background:var(--bg2)}
    .item-list::-webkit-scrollbar{width:4px}
    .item-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

    /* Watcher cards */
    .call-card{background:var(--bg);border:1px solid var(--border);border-left:3px solid transparent;border-radius:8px;padding:9px 12px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
    .call-card:hover{border-color:#CBD5E1;box-shadow:0 2px 6px rgba(0,0,0,.08)}
    .call-card.expanded{border-left-color:var(--accent);border-color:#BFDBFE}
    .card-row{display:flex;align-items:center;gap:7px}
    .method-badge{font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;letter-spacing:.04em}
    .m-GET{background:#EFF6FF;color:#1D4ED8}
    .m-POST{background:#F5F3FF;color:#6D28D9}
    .m-PUT{background:#FFF7ED;color:#C2410C}
    .m-DELETE{background:#FFF1F2;color:#BE123C}
    .m-PATCH{background:#F0FDF4;color:#15803D}
    .m-other{background:var(--bg3);color:var(--muted)}
    .card-url{font-family:var(--mono);font-size:10px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .status-pill{font-family:var(--mono);font-size:9px;font-weight:700;flex-shrink:0}
    .s2{color:var(--green)}.s3{color:var(--orange)}.s4,.s5{color:var(--red)}
    .card-meta{display:flex;align-items:center;gap:7px;margin-top:4px}
    .tag-matched{font-family:var(--mono);font-size:8px;color:#6D28D9;background:#F5F3FF;padding:1px 6px;border-radius:4px;border:1px solid #EDE9FE}
    .tag-src{font-family:var(--mono);font-size:8px;color:var(--muted2)}
    .tag-json{font-family:var(--mono);font-size:8px;color:#15803D;background:#F0FDF4;padding:1px 6px;border-radius:4px;border:1px solid #BBF7D0}
    .card-detail{display:none;flex-direction:column;gap:6px;margin-top:9px}
    .call-card.expanded .card-detail{display:flex}
    .detail-block{background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden}
    .detail-title{font-family:var(--mono);font-size:8px;color:var(--muted);padding:4px 9px;background:var(--bg3);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:600}
    .detail-body{padding:7px 9px;font-family:var(--mono);font-size:9px;color:var(--text);max-height:110px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;line-height:1.6}
    .detail-body::-webkit-scrollbar{width:3px}
    .detail-body::-webkit-scrollbar-thumb{background:var(--border)}
    .k{color:#1D4ED8}.s{color:#15803D}.n{color:#C2410C}.b{color:#6D28D9}.nl{color:var(--muted)}

    /* Discover rows */
    .log-row{background:var(--bg);border:1px solid var(--border);border-left:3px solid transparent;border-radius:8px;padding:9px 12px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
    .log-row:hover{border-color:#CBD5E1;box-shadow:0 2px 6px rgba(0,0,0,.08)}
    .log-row.expanded{border-left-color:var(--accent2);border-color:#EDE9FE}
    .log-row-header{display:flex;align-items:center;gap:7px}
    .log-path{font-family:var(--mono);font-size:10px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .log-host{font-family:var(--mono);font-size:8px;color:var(--muted2);margin-top:3px}
    .add-btn{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:4px;color:var(--accent);font-family:var(--mono);font-size:8px;padding:3px 8px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;font-weight:600}
    .add-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
    .add-btn.added{color:var(--green);background:#F0FDF4;border-color:#BBF7D0;pointer-events:none}
    .caret{font-size:8px;color:var(--muted2);width:10px;flex-shrink:0;user-select:none}
    .log-detail{display:none;margin-top:7px}
    .log-row.expanded .log-detail{display:block}
    .log-full-url{font-family:var(--mono);font-size:9px;color:var(--muted);word-break:break-all;line-height:1.6;background:var(--bg2);border:1px solid var(--border);padding:6px 9px;border-radius:5px}

    /* File config cards */
    .fc-card{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--accent2);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
    .fc-card:hover{border-color:#CBD5E1;box-shadow:0 2px 6px rgba(0,0,0,.08)}
    .fc-card.expanded .fc-detail{display:block}
    .fc-header{display:flex;align-items:center;gap:8px}
    .fc-filename{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .fc-model{font-family:var(--mono);font-size:8px;color:#6D28D9;background:#F5F3FF;padding:1px 7px;border-radius:4px;flex-shrink:0;border:1px solid #EDE9FE;font-weight:600}
    .fc-title{font-family:var(--sans);font-size:9px;color:var(--muted);margin-top:3px}
    .fc-stats{display:flex;gap:12px;margin-top:5px}
    .fc-stat{font-family:var(--sans);font-size:9px;color:var(--muted)}
    .fc-stat b{color:var(--text);font-weight:600}
    .fc-detail{display:none;margin-top:10px}
    .fc-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:9px}
    .fc-table th{background:var(--bg3);color:var(--muted);padding:5px 9px;text-align:left;border-bottom:1px solid var(--border);letter-spacing:.04em;text-transform:uppercase;font-size:8px;font-weight:600}
    .fc-table td{padding:5px 9px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
    .fc-table tr:last-child td{border-bottom:none}
    .fc-table tr.disabled td{color:var(--muted2);opacity:.6}
    .fc-dl-btn{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:4px;color:var(--accent);font-size:10px;padding:2px 8px;cursor:pointer;transition:all .15s;flex-shrink:0;font-weight:600}
    .fc-dl-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
    .badge-on{color:var(--green);font-size:9px}
    .badge-off{color:var(--muted2);font-size:9px}
    .badge-req{color:var(--orange);font-size:9px}
    .fc-no-data{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px 20px;color:var(--muted);font-family:var(--sans);font-size:11px;text-align:center}

    /* Row logs */
    .rl-card{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--orange);border-radius:8px;padding:10px 12px;box-shadow:var(--shadow)}
    .rl-card.success{border-left-color:var(--green)}
    .rl-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
    .rl-filename{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text);flex:1;line-height:1.4;word-break:break-all}
    .rl-status-badge{font-family:var(--sans);font-size:8px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0;white-space:nowrap}
    .rl-status-badge.fail{background:#FFF1F2;color:#BE123C;border:1px solid #FECDD3}
    .rl-status-badge.pass{background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0}
    .rl-progress{margin-bottom:8px}
    .rl-progress-text{font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:4px}
    .rl-progress-text b{color:var(--text)}
    .rl-progress-text.complete b{color:var(--green)}
    .rl-bar-wrap{background:var(--bg3);border-radius:4px;height:4px;overflow:hidden;border:1px solid var(--border)}
    .rl-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease}
    .rl-bar-fill.complete{background:var(--green)}
    .rl-actions{display:flex;gap:6px;margin-top:9px}
    .rl-dl-btn{display:flex;align-items:center;gap:4px;border-radius:5px;font-family:var(--sans);font-size:9px;font-weight:600;padding:5px 10px;cursor:pointer;transition:all .15s;white-space:nowrap}
    .rl-dl-btn.fail-btn{color:#BE123C;border:1px solid #FECDD3;background:#FFF1F2}
    .rl-dl-btn.fail-btn:hover{background:var(--red);color:#fff;border-color:var(--red)}
    .rl-dl-btn.pass-btn{color:#15803D;border:1px solid #BBF7D0;background:#F0FDF4}
    .rl-dl-btn.pass-btn:hover{background:var(--green);color:#fff;border-color:var(--green)}
    .rl-meta{font-family:var(--mono);font-size:8px;color:var(--muted2);margin-top:4px}

    /* Empty state */
    .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);background:var(--bg2)}
    .empty-icon{font-size:30px;opacity:.5}
    .empty-title{font-size:13px;font-weight:600;color:var(--text)}
    .empty-sub{font-family:var(--sans);font-size:11px;text-align:center;line-height:1.8;max-width:280px;color:var(--muted)}
    .btn-go{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:7px;color:var(--accent);font-family:var(--sans);font-size:10px;font-weight:500;padding:6px 14px;cursor:pointer;transition:all .15s}
    .btn-go:hover{background:var(--accent);color:#fff}

    /* Status bar */
    .status-bar{padding:6px 14px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--muted2);display:inline-block;margin-right:6px}
    .dot.on{background:var(--green);box-shadow:0 0 0 2px rgba(26,158,92,.2);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
    .status-text{font-family:var(--sans);font-size:9px;color:var(--muted);font-weight:500}

    /* Toast */
    .toast{position:fixed;bottom:12px;right:12px;background:var(--text);border-radius:8px;padding:7px 14px;font-family:var(--sans);font-size:10px;font-weight:500;color:#fff;opacity:0;transform:translateY(5px);transition:all .2s;pointer-events:none;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .toast.show{opacity:1;transform:translateY(0)}
  </style>
</head>
<body>

<div class="header">
  <div class="h-left">
    <div class="logo">📡</div>
    <div>
      <div class="title">API Watcher</div>
      <div class="page-host" id="pageHost">—</div>
    </div>
  </div>
  <div class="h-right">
    <div class="toggle-wrap">
      <span class="toggle-label" id="toggleLabel">OFF</span>
      <label class="toggle">
        <input type="checkbox" id="mainToggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="watcher">👁 Watcher</button>
  <button class="tab-btn" data-tab="discover">🔍 Discover</button>
  <button class="tab-btn" data-tab="fileconfig">📋 File Config</button>
  <button class="tab-btn" data-tab="rowlogs">📄 Row Logs</button>
</div>

<!-- WATCHER TAB -->
<div class="tab-panel active" id="tab-watcher">
  <div class="toolbar">
    <input class="toolbar-search" id="watcherSearch" placeholder="Filter by URL or identifier…">
    <span class="count-lbl">Hits: <b id="callCount">0</b></span>
    <button class="btn-xs primary" id="exportBtn">⬇ CSV</button>
    <button class="btn-xs danger" id="clearBtn">Clear</button>
  </div>
  <div class="item-list" id="callList"></div>
</div>

<!-- DISCOVER TAB -->
<div class="tab-panel" id="tab-discover">
  <div class="filter-bar">
    <input class="toolbar-search" id="discoverSearch" placeholder="Search URL or path…" style="flex:1;min-width:140px">
    <span class="filter-label">Method:</span>
    <select class="filter-select" id="methodFilter">
      <option value="">All</option>
      <option value="GET">GET</option>
      <option value="POST">POST</option>
      <option value="PUT">PUT</option>
      <option value="DELETE">DELETE</option>
      <option value="PATCH">PATCH</option>
    </select>
    <span class="filter-label">Status:</span>
    <select class="filter-select" id="statusFilter">
      <option value="">All</option>
      <option value="2">2xx</option>
      <option value="3">3xx</option>
      <option value="4">4xx</option>
      <option value="5">5xx</option>
    </select>
    <span class="count-lbl">Seen: <b id="logCount">0</b></span>
    <button class="btn-xs danger" id="clearLogBtn">Clear</button>
  </div>
  <div class="item-list" id="discoverList"></div>
</div>

<!-- FILE CONFIG TAB -->
<div class="tab-panel" id="tab-fileconfig">
  <div class="toolbar">
    <input class="toolbar-search" id="fileconfigSearch" placeholder="Search file or model name…">
    <span class="count-lbl">Files: <b id="fileconfigCount">0</b></span>
    <button class="btn-xs primary" id="exportConfigBtn" title="Click ⬇ on each file to download its template">ℹ How to download</button>
  </div>
  <div class="item-list" id="fileconfigList"></div>
</div>

<!-- ROW LOGS TAB -->
<div class="tab-panel" id="tab-rowlogs">
  <div class="toolbar" style="flex-wrap:wrap;gap:5px">
    <span class="count-lbl" style="flex:1">Captured row-level API responses</span>
    <button class="btn-xs danger" id="clearRowLogsBtn">Clear</button>
  </div>
  <div class="item-list" id="rowlogsList"></div>
</div>

<div class="status-bar">
  <div><span class="dot" id="statusDot"></span><span class="status-text" id="statusText">Watcher inactive</span></div>
  <span class="status-text" id="identifierCount">0 identifiers active</span>
</div>

<div class="toast" id="toast"></div>
<script src="popup.js"></script>
</body>
</html>
